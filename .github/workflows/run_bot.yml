name: My Boatrace Patrol

permissions:
  contents: write

concurrency:
  group: boatrace-patrol
  cancel-in-progress: true

on:
  # GitHubのscheduleトリガーは使わない。15分おき(3-59/15)を指定しても実際には
  # 1〜2時間に1回程度まで間引かれるため「締切5〜35分前」の窓を捕まえられず、
  # さらに稀に発火した回が concurrency の cancel-in-progress によって
  # cron-job.org からの本来の実行をキャンセルしてしまっていた。
  # 定期実行は cron-job.org からの workflow_dispatch に一本化する(README参照)。
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot state from bot-state branch
        run: |
          git fetch origin bot-state 2>/dev/null || echo "bot-state branch not found yet"
          for f in predictions.csv notified_races.log bot_state.json; do
            git show origin/bot-state:$f > "$f" 2>/dev/null && echo "  restored $f" || echo "  (no $f yet)"
          done

      - name: Run Patrol
        env:
          # 未設定のチャンネルは main.py 側で DISCORD_WEBHOOK_URL にフォールバックする
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_PREDICT: ${{ secrets.DISCORD_WEBHOOK_URL_PREDICT }}
          DISCORD_WEBHOOK_URL_STATS: ${{ secrets.DISCORD_WEBHOOK_URL_STATS }}
          DISCORD_WEBHOOK_URL_SYSTEM: ${{ secrets.DISCORD_WEBHOOK_URL_SYSTEM }}
          DISCORD_WEBHOOK_URL_SCHEDULE: ${{ secrets.DISCORD_WEBHOOK_URL_SCHEDULE }}
        run: |
          python main.py

      - name: Ensure state files
        if: always()
        run: |
          touch predictions.csv notified_races.log bot_state.json

      - name: Save bot state to bot-state branch
        if: always()
        run: |
          git config user.name "boatrace-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin bot-state 2>/dev/null || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git worktree add state-worktree -B bot-state origin/bot-state
          else
            git worktree add state-worktree -B bot-state
          fi
          for f in predictions.csv notified_races.log bot_state.json; do
            [ -f "$f" ] && cp "$f" state-worktree/
          done
          cd state-worktree
          git add -f predictions.csv notified_races.log bot_state.json
          if ! git diff --cached --quiet; then
            git commit -m "Update bot state"
            git push origin HEAD:bot-state
          else
            echo "no state changes to commit"
          fi

      - name: Publish dashboard to gh-pages
        if: always()
        run: |
          python scripts/build_dashboard.py
          git config user.name "boatrace-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add pages-worktree -B gh-pages origin/gh-pages
          else
            git worktree add pages-worktree -B gh-pages
            rm -rf pages-worktree/* 2>/dev/null || true
          fi
          cp docs/index.html pages-worktree/index.html
          touch pages-worktree/.nojekyll
          cd pages-worktree
          git add -f index.html .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "Update dashboard"
            git push origin HEAD:gh-pages
          else
            echo "no dashboard changes to commit"
          fi

      - name: Upload prediction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-log-${{ github.run_id }}
          path: predictions.csv
          if-no-files-found: ignore
          retention-days: 30
