name: My Boatrace Patrol

permissions:
  contents: read

concurrency:
  group: boatrace-patrol
  cancel-in-progress: true

on:
  schedule:
    # 自動実行確認用: 1分おきに実行
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: |
            predictions.csv
            notified_races.log
          key: bot-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-state-

      - name: Run Patrol
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py

      - name: Ensure state files
        if: always()
        run: |
          touch predictions.csv notified_races.log

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            predictions.csv
            notified_races.log
          key: bot-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload prediction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-log-${{ github.run_id }}
          path: predictions.csv
          if-no-files-found: ignore
          retention-days: 30
