name: My Boatrace Patrol

permissions:
  contents: write

concurrency:
  group: boatrace-patrol
  cancel-in-progress: true

on:
  schedule:
    # 混雑しやすい00分を避けて15分おきに実行
    - cron: '3-59/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore bot state from bot-state branch
        run: |
          git fetch origin bot-state 2>/dev/null || echo "bot-state branch not found yet"
          for f in predictions.csv notified_races.log bot_state.json; do
            git show origin/bot-state:$f > "$f" 2>/dev/null && echo "  restored $f" || echo "  (no $f yet)"
          done

      - name: Run Patrol
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py

      - name: Ensure state files
        if: always()
        run: |
          touch predictions.csv notified_races.log bot_state.json

      - name: Save bot state to bot-state branch
        if: always()
        run: |
          git config user.name "boatrace-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin bot-state 2>/dev/null || true
          if git rev-parse --verify origin/bot-state >/dev/null 2>&1; then
            git worktree add state-worktree -B bot-state origin/bot-state
          else
            git worktree add state-worktree -B bot-state
          fi
          for f in predictions.csv notified_races.log bot_state.json; do
            [ -f "$f" ] && cp "$f" state-worktree/
          done
          cd state-worktree
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update bot state"
            git push origin HEAD:bot-state
          else
            echo "no state changes to commit"
          fi

      - name: Upload prediction log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-log-${{ github.run_id }}
          path: predictions.csv
          if-no-files-found: ignore
          retention-days: 30
