name: Test Discord Webhooks

# チャンネル振り分けの動作確認用。手動実行のみ。
# 確認が済んだらこのワークフローは削除してよい。

on:
  workflow_dispatch:

jobs:
  test-webhooks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Send a test notice to each channel
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_PREDICT: ${{ secrets.DISCORD_WEBHOOK_URL_PREDICT }}
          DISCORD_WEBHOOK_URL_STATS: ${{ secrets.DISCORD_WEBHOOK_URL_STATS }}
          DISCORD_WEBHOOK_URL_SYSTEM: ${{ secrets.DISCORD_WEBHOOK_URL_SYSTEM }}
          DISCORD_WEBHOOK_URL_SCHEDULE: ${{ secrets.DISCORD_WEBHOOK_URL_SCHEDULE }}
        run: |
          python - <<'PY'
          import os

          # main.py と同じ振り分けロジック(依存を増やさないためここで再現)
          base = os.environ.get("DISCORD_WEBHOOK_URL")
          channels = {
              "predict":  os.environ.get("DISCORD_WEBHOOK_URL_PREDICT")  or base,
              "stats":    os.environ.get("DISCORD_WEBHOOK_URL_STATS")    or base,
              "system":   os.environ.get("DISCORD_WEBHOOK_URL_SYSTEM")   or base,
              "schedule": os.environ.get("DISCORD_WEBHOOK_URL_SCHEDULE") or base,
          }

          labels = {
              "predict":  "🎯 予想チャンネル",
              "stats":    "📊 成績チャンネル",
              "system":   "⚙️ システムチャンネル",
              "schedule": "⏰ 締切スケジュールチャンネル",
          }
          env_names = {
              "predict":  "DISCORD_WEBHOOK_URL_PREDICT",
              "stats":    "DISCORD_WEBHOOK_URL_STATS",
              "system":   "DISCORD_WEBHOOK_URL_SYSTEM",
              "schedule": "DISCORD_WEBHOOK_URL_SCHEDULE",
          }

          import requests

          print("=== 各チャンネルの設定状況 ===")
          for key in channels:
              dedicated = bool(os.environ.get(env_names[key]))
              state = "専用Webhook" if dedicated else ("フォールバック(DISCORD_WEBHOOK_URL)" if base else "未設定")
              print(f"  {key:<9}: {state}")

          print("\n=== テスト送信 ===")
          failed = []
          for key, url in channels.items():
              if not url:
                  print(f"  {key}: URLが無いのでスキップ")
                  failed.append(key)
                  continue
              dedicated = bool(os.environ.get(env_names[key]))
              note = "専用Webhookに届いています" if dedicated else "⚠️ フォールバック中(専用Secretが未設定)"
              content = (
                  f"✅ **Webhookテスト: {labels[key]}**\n"
                  f"このメッセージが `{labels[key]}` に表示されていれば振り分けは正常です。\n"
                  f"状態: {note}"
              )
              r = requests.post(url, json={"content": content}, timeout=15)
              ok = 200 <= r.status_code < 300
              print(f"  {key}: {'OK' if ok else 'FAILED ' + str(r.status_code)}")
              if not ok:
                  failed.append(key)

          if failed:
              raise SystemExit(f"送信に失敗したチャンネル: {failed}")
          print("\n全チャンネルへの送信に成功しました。")
          PY

      - name: Send a sample deadline digest (uses the real build_schedule_digest)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_PREDICT: ${{ secrets.DISCORD_WEBHOOK_URL_PREDICT }}
          DISCORD_WEBHOOK_URL_STATS: ${{ secrets.DISCORD_WEBHOOK_URL_STATS }}
          DISCORD_WEBHOOK_URL_SYSTEM: ${{ secrets.DISCORD_WEBHOOK_URL_SYSTEM }}
          DISCORD_WEBHOOK_URL_SCHEDULE: ${{ secrets.DISCORD_WEBHOOK_URL_SCHEDULE }}
        run: |
          pip install -r requirements.txt
          python - <<'PY'
          import csv, json
          from datetime import datetime, timedelta
          import main

          # 本番と同じ形式のダミー予想(未決着・締切がこれから)を書き、
          # 本番の build_schedule_digest / send_discord_embed をそのまま通す。
          now = datetime.now(main.JST)
          races = [
              ("蒲郡", 5, 6, {"3-1-2": {"stake": 100}, "3-4-2": {"stake": 200}}),
              ("江戸川", 11, 14, {"2-1-3": {"stake": 200}}),
              ("津", 7, 40, {"3-1-2": {"stake": 400}}),
              ("丸亀", 3, 55, {"2-5-1": {"stake": 100}, "2-1-6": {"stake": 100}}),
          ]
          rows = []
          for course, rno, mins, details in races:
              deadline = now + timedelta(minutes=mins)
              rows.append({
                  "date": now.strftime("%Y%m%d"),
                  "course": course,
                  "rno": str(rno),
                  "deadline": deadline.strftime("%H:%M"),
                  "ticket_count": str(len(details)),
                  "stake": "",
                  "ticket_details": json.dumps(details, ensure_ascii=False),
              })

          with open(main.PREDICTION_LOG_FILE, "w", newline="", encoding="utf-8-sig") as f:
              w = csv.DictWriter(f, fieldnames=main.PREDICTION_LOG_FIELDS, extrasaction="ignore")
              w.writeheader()
              w.writerows(rows)

          digest = main.build_schedule_digest(now)
          if not digest:
              raise SystemExit("ダイジェストが生成されませんでした")

          print("生成されたダイジェスト:")
          print(digest["title"])
          print(digest["description"])

          ok = main.send_discord_embed(digest, "webhook test digest", channel="schedule")
          if not ok:
              raise SystemExit("ダイジェストの送信に失敗しました")
          print("\n締切スケジュールのサンプルを送信しました。")
          PY
